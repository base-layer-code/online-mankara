<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --p0: #ff5252; --p1: #448aff; --p2: #4caf50; --p3: #ffc107;
            --p0-bg: #1a0a0a; --p1-bg: #0a0e1a; --p2-bg: #0a1a0a; --p3-bg: #1a150a;
            --neon: #4caf50;
        }
        body { font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; background: #000; color: #fff; margin: 0; padding: 10px; transition: 0.8s; overflow: hidden; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .room-card { border: 2px solid var(--neon); padding: 40px; border-radius: 20px; text-align: center; background: #050505; }
        .room-code { font-size: 56px; color: var(--neon); font-weight: bold; margin: 20px 0; letter-spacing: 8px; }
        #game-canvas { position: relative; width: 540px; height: 540px; background: radial-gradient(circle, #3e2723 0%, #1a0f0d 100%); border-radius: 50%; border: 10px solid #222; }
        .pit { position: absolute; width: 44px; height: 44px; background: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #fff; font-weight: bold; cursor: pointer; transform: translate(-50%, -50%); border: 1px solid #444; z-index: 5; }
        .pit.store { width: 60px; height: 60px; border: 2px solid gold; color: gold; font-size: 24px; }
        .pit.active-turn { box-shadow: 0 0 20px #fff; border-color: #fff; transform: translate(-50%, -50%) scale(1.1); }
        .pit.disabled { pointer-events: none; opacity: 0.2; }
        #arrows-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .status { font-size: 24px; font-weight: bold; margin: 10px; height: 40px; }
        .ranking { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 30px; border-radius: 10px; border: 2px solid gold; z-index: 200; display: none; text-align: center; }
        button { background: var(--neon); color: #000; padding: 10px 30px; font-weight: bold; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body id="bg">

<div id="lobby" class="overlay">
    <div class="room-card">
        <h1>⚡ NEON MANCALA ONLINE</h1>
        <p>あなたのルームコード</p>
        <div id="display-room-code" class="room-code">WAIT...</div>
        <div id="wait-msg">サーバーに接続中...</div>
        <button id="start-btn" onclick="requestStart()" style="display:none; margin-top:20px;">🎮 ゲーム開始</button>
    </div>
</div>

<div class="status" id="status">PLAYER WAITING...</div>
<div id="ranking" class="ranking"></div>
<div id="game-canvas">
    <svg id="arrows-svg"></svg>
    <div id="pits-layer"></div>
</div>

<script>
    const socket = io();
    let players = [], currentPlayer = 0, gameOver = false, allPits = [], rankings = [];
    let myRoomId = null, myId = null, isHost = false;

    // --- 通信イベント ---
    socket.emit('join-room');

    socket.on('init', (data) => {
        myRoomId = data.roomId;
        myId = data.myId;
        isHost = data.isHost;
        document.getElementById('display-room-code').innerText = myRoomId;
        document.getElementById('wait-msg').innerText = "P2の参加を待っています...";
    });

    socket.on('player-joined', (data) => {
        document.getElementById('wait-msg').innerHTML = "✅ <span style='color:var(--neon)'>READY! (2/2)</span>";
        if(isHost) document.getElementById('start-btn').style.display = "inline-block";
    });

    function requestStart() {
        socket.emit('start-game', myRoomId);
    }

    socket.on('game-start-broadcast', () => {
        document.getElementById('lobby').style.display = 'none';
        initGame();
    });

    socket.on('receive-move', (idx) => {
        move(idx, false, null, true);
    });

    // --- ゲームロジック ---
    function initGame() {
        allPits = []; players = []; rankings = [];
        for (let i = 0; i < 2; i++) {
            players.push({ id: i, color: `var(--p${i})`, finished: false });
            for (let j = 0; j < 5; j++) allPits.push({ owner: i, stones: 4, type: 'normal', index: j });
            allPits.push({ owner: i, stones: 0, type: 'store', index: 5 });
        }
        currentPlayer = 0; draw();
    }

    function draw() {
        const layer = document.getElementById('pits-layer'), svg = document.getElementById('arrows-svg'), cX = 270, cY = 270, rad = 220, total = allPits.length;
        layer.innerHTML = ''; svg.innerHTML = '';
        if (!gameOver) {
            document.getElementById('bg').style.backgroundColor = `var(--p${currentPlayer}-bg)`;
            document.getElementById('status').innerText = (currentPlayer === myId) ? ">> YOUR TURN" : ">> OPPONENT TURN";
        }
        allPits.forEach((n, i) => {
            const ang = (i / total) * Math.PI * 2 + Math.PI;
            n.x = cX + Math.cos(ang) * rad; n.y = cY + Math.sin(ang) * rad;
            const div = document.createElement('div');
            div.className = `pit ${n.type === 'store' ? 'store' : ''}`;
            const isFin = players[n.owner].finished;
            const isMyTurn = (currentPlayer === myId);

            if (!gameOver && !isFin && n.owner === currentPlayer && n.type === 'normal' && n.stones > 0 && isMyTurn) div.classList.add('active-turn');
            if (n.type === 'normal' && (isFin || n.owner !== currentPlayer || gameOver)) div.classList.add('disabled');
            
            div.style.left = n.x + 'px'; div.style.top = n.y + 'px';
            div.style.backgroundColor = isFin ? '#222' : (n.owner === currentPlayer ? players[n.owner].color : '#000');
            div.style.borderColor = players[n.owner].color; div.innerText = n.stones;
            
            div.onclick = () => { if(isMyTurn) { socket.emit('make-move', { roomId: myRoomId, idx: i }); move(i); } };
            layer.appendChild(div);
            
            const nIdx = (i + 1) % total, nAng = (nIdx / total) * Math.PI * 2 + Math.PI;
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", n.x); line.setAttribute("y1", n.y); line.setAttribute("x2", cX + Math.cos(nAng) * rad); line.setAttribute("y2", cY + Math.sin(nAng) * rad);
            line.setAttribute("stroke", (!isFin && n.owner === currentPlayer) ? "#fff" : "#333");
            line.setAttribute("stroke-width", "1"); line.setAttribute("stroke-dasharray", "4,2"); svg.appendChild(line);
        });
    }

    function move(idx, isSim = false, state = null, fromNetwork = false) {
        let s = isSim ? state : { pits: JSON.parse(JSON.stringify(allPits)), pls: JSON.parse(JSON.stringify(players)), cur: currentPlayer };
        let stones = s.pits[idx].stones; s.pits[idx].stones = 0;
        let c = idx;
        while (stones > 0) {
            c = (c + 1) % s.pits.length;
            if (s.pls[s.pits[c].owner].finished || (s.pits[c].type === 'store' && s.pits[c].owner !== s.cur)) continue;
            s.pits[c].stones++; stones--;
        }
        let repeat = (s.pits[c].type === 'store' && s.pits[c].owner === s.cur);
        s.pls.forEach(p => { if (!p.finished && s.pits.filter(n => n.owner === p.id && n.type === 'normal').every(n => n.stones === 0)) { p.finished = true; if(!isSim) rankings.push(p.id); }});
        if (!repeat || s.pls[s.cur].finished) {
            if (s.pls.filter(p => !p.finished).length <= 1) { if(!isSim) end(); return s; }
            do { s.cur = (s.cur + 1) % s.pls.length; } while (s.pls[s.cur].finished);
        }
        if (!isSim) { allPits = s.pits; players = s.pls; currentPlayer = s.cur; draw(); }
        return s;
    }

    function end() {
        gameOver = true; players.forEach(p => { if (!rankings.includes(p.id)) rankings.push(p.id); });
        const r = document.getElementById('ranking');
        let h = "<h2 style='color:gold'>GAME OVER</h2>";
        rankings.forEach((id, i) => h += `<p style="color:var(--p${id})">RANK ${i+1}: P${id+1}</p>`);
        h += "<button onclick='location.reload()'>REMATCH</button>";
        r.innerHTML = h; r.style.display = 'block';
    }
</script>
</body>
</html>
